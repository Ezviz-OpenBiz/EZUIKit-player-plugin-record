# 整个流程的名字
name: Release
# 触发时机，在 tag 被 push 操作触发
on:
  push:
    tags:
      - "v*"

permissions:
  id-token: write # Required for OIDC
  contents: write # Required for GitHub Release

# 任务，定义个changelog 的任务
jobs:
  changelog:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check file versions
        run: |
          files="dist/index.js dist/index.umd.js package.json"

          version=""
          inconsistent=false

          for file in $files; do
            if [ ! -f "$file" ]; then
              echo "缺少文件: $file"
              inconsistent=true
              continue
            fi
            v=$(head -3 "$file" | grep -Eo '([0-9]+\.[0-9]+\.[0-9]+)+(-[a-z]+\.[0-9]+)?')
            if [ -z "$v" ]; then
              echo "文件 $file 未检测到版本号"
              inconsistent=true
              continue
            fi
            if [ -z "$version" ]; then
              version="$v"
            else
              if [ "$version" != "$v" ]; then
                echo "文件 $file 的版本号 $v 与其它文件版本号 $version 不一致"
                inconsistent=true
              fi
            fi
          done

          if [ "$inconsistent" = true ]; then
            echo "版本号不一致，禁止推送！"
            exit 1
          fi

          echo "所有文件版本号一致: $version"

      # # 设置 pnpm
      # - name: Setup PNPM
      #   uses: pnpm/action-setup@v2
      #   with:
      #     version: 8
      # 设置 Node
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          # Node 24 自带 npm >= 11.5.1，满足 Trusted Publishing(OIDC) 要求。
          # 不再用 `npm install -g npm@latest` 就地升级——那会导致 npm 自带依赖(如 sigstore)缺失，
          # 触发 `--provenance` 时报 Cannot find module 'sigstore'。
          node-version: 24
          registry-url: https://registry.npmjs.org

      # 打印版本，便于日后排查（确认 npm >= 11.5.1）
      - run: node --version && npm --version
      # 安装依赖
      - name: npm Install dependencies
        run: npm install

      - name: yarn Install dependencies
        run: yarn install

      # 获取 tag 的版本类型（仅支持 正式版、alpha和beta版）
      - name: Determine release tag
        id: determine_tag
        run: |
          TAG=$(echo "${GITHUB_REF}" | sed 's/refs\/tags\/\(.*\)/\1/')
          if [[ "$TAG" =~ -alpha ]]; then
            echo "tag=alpha" >> "$GITHUB_OUTPUT"
          elif [[ "$TAG" =~ -beta ]]; then
            echo "tag=beta" >> "$GITHUB_OUTPUT"
          elif [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          else
            echo "Unsupported version detected. Terminating."
            exit 1
          fi
      # # 打包
      # - name: Build Packages
      #   run: pnpm run build
      # 通过 Trusted Publishing(OIDC) 发布，无需 NODE_AUTH_TOKEN，OIDC 自动认证
      # provenance 在可信发布下会自动生成（本仓库为公开仓库，可正常生成）
      - name: Publish npm
        run: npm publish --tag ${{ steps.determine_tag.outputs.tag }} --access public --provenance

      - name: Build sha
        run: echo ${{ github.sha }} > Release.txt
      - name: Test
        run: cat Release.txt
      # 自动创建 GitHub Release
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          prerelease: ${{ steps.determine_tag.outputs.tag != 'latest' }}
          files: |
            dist/index.js
            dist/index.umd.js
            package.json
            README.md
            Release.txt
